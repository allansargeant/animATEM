name: ci

# Typecheck/lint/test on every push and PR — separate from release.yml,
# which only builds installers on a version tag.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  animatem:
    name: animATEM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  companion-module:
    name: companion-module
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: companion-module
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: companion-module/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
